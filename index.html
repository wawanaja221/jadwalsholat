<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jadwal Sholat + Audio Scheduler</title>

<style>
body{
background:black;
color:red;
font-family:monospace;
margin:0;
text-align:center;
}

#judul{font-size:50px;margin-top:20px;color:orange;}
#tanggal{font-size:30px;color:cyan;margin-top:10px;}
#jam{font-size:120px;margin-top:25px;color:orange;}
#imam{font-size:30px;color:white;margin-top:10px;}
#kalenderJawa{font-size:28px;color:lime;margin-top:10px;}
#countdown{font-size:40px;color:white;margin-top:200px;}
#jadwal{font-size:30px;color:yellow;margin-top:50px;}

#adzan{
display:none;
position:absolute;
top:50%;
width:100%;
font-size:80px;
color:lime;
}

#settingBtn{
position:fixed;
bottom:10px;
right:10px;
padding:6px 10px;
cursor:pointer;
}

#audioPanel{
display:none;
position:fixed;
bottom:50px;
right:10px;
background:#111;
padding:10px;
border:1px solid #555;
max-height:400px;
overflow:auto;
color:white;
}
</style>
</head>

<body>

<div id="judul">JADWAL SHOLAT</div>
<div id="tanggal"></div>
<div id="jam"></div>
<div id="imam">MASTER IMAM : ......?</div>
<div id="kalenderJawa"></div>
<div id="countdown"></div>
<div id="adzan"></div>

<div id="jadwal">
Imsak 04:03 | Subuh 04:13 | Dzuhur 11:31 <br>
Ashar 14:49 | Maghrib 17:28 | Isya 18:36
</div>

<button id="settingBtn">⚙</button>

<div id="audioPanel">
<h3>Audio Scheduler</h3>

Volume:
<input type="range" id="volume" min="0" max="2" step="0.1">
<span id="volText"></span>

<div id="audioBlocks"></div>
</div>

<audio id="player"></audio>

<script>

// ================= AUDIO ENGINE =================
let audioCtx
let gainNode

function initAudio(){
audioCtx = new AudioContext()

gainNode = audioCtx.createGain()
gainNode.gain.value = localStorage.getItem("volume") || 1
gainNode.connect(audioCtx.destination)

document.getElementById("volume").value = gainNode.gain.value
updateVolText()
}

// ================= BEEP HALUS =================
function beep(freq,dur){

let osc = audioCtx.createOscillator()
let gain = audioCtx.createGain()

osc.type="sine"
osc.frequency.value=freq

gain.gain.setValueAtTime(0, audioCtx.currentTime)
gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.02)
gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur/1000)

osc.connect(gain)
gain.connect(gainNode)

osc.start()
osc.stop(audioCtx.currentTime + dur/1000)

}

// ================= POLA BEEP =================
function beepPendek(){
setTimeout(()=>beep(1000,300),0)
setTimeout(()=>beep(1000,300),400)
setTimeout(()=>beep(1000,300),800)
}

function beepPanjang(){
beep(900,4000)
}

// ================= JADWAL =================
let jadwal=[
{nama:"Subuh",waktu:"04:13"},
{nama:"Dzuhur",waktu:"11:31"},
{nama:"Ashar",waktu:"14:48"},
{nama:"Maghrib",waktu:"17:28"},
{nama:"Isya",waktu:"18:36"}
]

let beepDone={}
let adzanDone={}

// ================= CEK ADZAN =================
function cekAdzan(){

let now=new Date()

jadwal.forEach(item=>{

let [j,m]=item.waktu.split(":").map(Number)

if(now.getSeconds()==10){
beepDone[item.nama]=false
adzanDone[item.nama]=false
}

if(now.getHours()==j && now.getMinutes()==m-1 && now.getSeconds()==57 && !beepDone[item.nama]){
beepDone[item.nama]=true
beepPendek()
}

if(now.getHours()==j && now.getMinutes()==m && now.getSeconds()==0 && !adzanDone[item.nama]){
adzanDone[item.nama]=true
beepPanjang()
tampilAdzan(item.nama)
}

})

}

// ================= ADZAN TEXT =================
function tampilAdzan(nama){
let adzan=document.getElementById("adzan")
adzan.innerHTML="WAKTU ADZAN "+nama.toUpperCase()
adzan.style.display="block"
setTimeout(()=>adzan.style.display="none",10000)
}

// ================= JAM =================
function updateJam(){
let now=new Date()
document.getElementById("jam").innerHTML=
now.toLocaleTimeString()
}

// ================= TANGGAL =================
function updateTanggal(){
let now=new Date()

let hijri=new Intl.DateTimeFormat('id-TN-u-ca-islamic',{
day:'numeric',month:'long',year:'numeric'
}).format(now)

let masehi=now.toLocaleDateString('id-ID',{
weekday:'long',day:'numeric',month:'long',year:'numeric'
})

document.getElementById("tanggal").innerHTML=masehi+" | "+hijri
}

// ================= PASARAN =================
function getPasaranJawa(){
let now=new Date()
let pasaran=["Legi","Pahing","Pon","Wage","Kliwon"]
let tglAwal=new Date(1970,0,1)
let selisih=Math.floor((now-tglAwal)/(1000*60*60*24))
let index=(selisih+3)%5
document.getElementById("kalenderJawa").innerHTML="Pasaran: "+pasaran[index]
}

// ================= COUNTDOWN =================
function updateCountdown(){

let now=new Date()
let next=null,nama=""

for(let j of jadwal){
let t=j.waktu.split(":")
let w=new Date()
w.setHours(t[0],t[1],0)

if(w>now){next=w;nama=j.nama;break}
}

if(!next){
let t=jadwal[0].waktu.split(":")
next=new Date()
next.setDate(next.getDate()+1)
next.setHours(t[0],t[1],0)
nama=jadwal[0].nama
}

let s=next-now

let jam=Math.floor(s/3600000)
let menit=Math.floor((s%3600000)/60000)
let detik=Math.floor((s%60000)/1000)

document.getElementById("countdown").innerHTML=
"Menuju "+nama+" "+jam+":"+menit+":"+detik

}

// ================= AUDIO SCHEDULER =================
const dayNames=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"]
const audioBlocksDiv=document.getElementById("audioBlocks")
const audios=[]

for(let i=0;i<5;i++){

const div=document.createElement("div")

div.innerHTML=`
<hr>
<input type="file" class="audioFile" accept=".mp3"><br>
<input type="time" class="timeInput${i}" step="1">
<audio id="playerExtra${i}"></audio>
`

audioBlocksDiv.appendChild(div)

audios.push({
player:document.getElementById(`playerExtra${i}`),
file:null,
time:null
})

}

document.querySelectorAll(".audioFile").forEach((input,idx)=>{
input.addEventListener("change",e=>{
audios[idx].file=URL.createObjectURL(e.target.files[0])
audios[idx].player.src=audios[idx].file
})
})

for(let i=0;i<5;i++){
const timeInput=document.querySelector(`.timeInput${i}`)
timeInput.addEventListener("change",e=>{
const p=e.target.value.split(":").map(Number)
audios[i].time={hour:p[0],minute:p[1],second:p[2]||0}
})
}

function cekAudioTambahan(){

let now=new Date()

audios.forEach(audio=>{

if(!audio.file||!audio.time)return

if(
now.getHours()==audio.time.hour &&
now.getMinutes()==audio.time.minute &&
now.getSeconds()==audio.time.second
){
audio.player.play()
}

})

}

// ================= VOLUME =================
let volSlider=document.getElementById("volume")

function updateVolText(){
document.getElementById("volText").innerText=
Math.round(volSlider.value*100)+"%"
}

volSlider.oninput=function(){
gainNode.gain.value=this.value
localStorage.setItem("volume",this.value)
updateVolText()
}

// ================= START AUTO =================
function startSystem(){

initAudio()

updateJam()
updateTanggal()
getPasaranJawa()

setInterval(updateJam,1000)
setInterval(updateTanggal,60000)
setInterval(getPasaranJawa,60000)
setInterval(updateCountdown,1000)
setInterval(cekAdzan,1000)
setInterval(cekAudioTambahan,1000)

}

window.onload=startSystem

// ================= SETTING =================
document.getElementById("settingBtn").onclick=()=>{
let panel=document.getElementById("audioPanel")
panel.style.display=panel.style.display=="none"?"block":"none"
}

</script>

</body>
</html>
